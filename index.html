<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Parry is gay Clicker</title>
  <style>
    :root{
      --bg:#050608;
      --green:#39ff14;
      --muted:#2b2f33;
      --text:#c7ffd8;
      --panel:#08100f;
      --shadow:rgba(57,255,20,0.18);
      --mono: "Courier New", Courier, monospace;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;}
    body{
      margin:0;
      background: radial-gradient(ellipse at center, rgba(57,255,20,0.03) 0%, rgba(5,6,8,1) 45%);
      color:var(--text);
      font-family:var(--mono);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .screen{
      width:92vw;
      max-width:980px;
      min-height:88vh;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(57,255,20,0.12);
      box-shadow:0 0 100px rgba(57,255,20,0.08), inset 0 0 40px rgba(57,255,20,0.05);
      padding:24px;
      position:relative;
      display:grid;
      grid-template-columns:1fr 300px;
      grid-template-rows:auto 1fr;
      gap:18px;
      overflow:hidden;
    }
    .screen::before{
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(circle at top left, rgba(57,255,20,0.08), transparent 22%),
                 radial-gradient(circle at bottom right, rgba(57,255,20,0.08), transparent 20%);
      pointer-events:none;
    }
    .hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1;}
    .title{font-size:22px;font-weight:700;color:var(--green);letter-spacing:1px;}
    .subtitle{color:var(--muted);font-size:14px;}
    .panel{background:rgba(0,0,0,0.35);border:1px solid rgba(57,255,20,0.12);box-shadow:0 0 40px rgba(0,0,0,0.2);border-radius:16px;padding:20px;position:relative;z-index:1;}
    .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;}
    .stat-card{background:rgba(0,0,0,0.24);border:1px solid rgba(57,255,20,0.12);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;}
    .stat-title{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:1.5px;}
    .stat-value{font-size:30px;font-weight:700;color:var(--green);}
    .clicker-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:280px;}
    .clicker-btn{width:100%;max-width:320px;padding:20px 0;border:none;border-radius:999px;background:linear-gradient(135deg, rgba(57,255,20,0.2), rgba(57,255,20,0.08));color:var(--green);font-size:22px;font-weight:700;cursor:pointer;box-shadow:0 0 30px rgba(57,255,20,0.12);transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;}
    .clicker-btn:hover{transform:scale(1.02);filter:brightness(1.05);}
    .clicker-btn:active{transform:scale(0.96);box-shadow:0 0 18px rgba(57,255,20,0.24);}
    .click-tip{color:var(--muted);font-size:14px;}
    .shop-card{grid-row:2 / span 1;}
    .shop-title{font-size:18px;font-weight:700;color:var(--green);margin-bottom:14px;}
    .instruction-panel{grid-column:1/-1;display:flex;flex-direction:column;gap:10px;}
    .instruction-panel .line{padding-left:8px;border-left:2px solid rgba(57,255,20,0.35);}
    .shop-item{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:12px;background:rgba(0,0,0,0.24);border:1px solid rgba(57,255,20,0.12);margin-bottom:12px;gap:12px;}
    .shop-item:last-child{margin-bottom:0;}
    .shop-meta{display:flex;flex-direction:column;gap:4px;}
    .shop-name{font-size:15px;font-weight:700;}
    .shop-desc{color:var(--muted);font-size:13px;}
    .buy-btn{padding:10px 14px;border:none;border-radius:999px;background:rgba(57,255,20,0.18);color:var(--green);cursor:pointer;font-family:var(--mono);transition:transform .12s ease,background .12s ease;}
    .buy-btn:hover{background:rgba(57,255,20,0.28);transform:scale(1.02);}
    .buy-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .terminal{grid-column:1/-1;min-height:160px;background:rgba(0,0,0,0.2);border:1px dashed rgba(57,255,20,0.08);border-radius:14px;padding:16px;overflow:auto;}
    .line{white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.55;color:var(--text);}
    .prompt{color:var(--green);}
    .cursor{display:inline-block;width:10px;height:16px;background:var(--green);margin-left:6px;animation:blink 1s step-end infinite;vertical-align:middle;border-radius:2px;}
    @keyframes blink{50%{opacity:0}}
    .floating{position:absolute;color:var(--green);font-size:18px;font-weight:700;pointer-events:none;opacity:0;animation:floating 0.8s ease-out forwards;}
    @keyframes floating{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-50px);opacity:0;}}
    @media (max-width:860px){.screen{grid-template-columns:1fr;grid-template-rows:auto auto auto;}}
    @media (max-width:560px){.screen{padding:16px;min-height:92vh;} .stats-grid{grid-template-columns:1fr;}.clicker-panel{min-height:220px;}}
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="screen">
    <div class="hdr">
      <div class="title">Parry is gay Clicker</div>
      <div class="subtitle">點擊、賺錢、升級你的 Parry 等級</div>
    </div>

    <div class="panel instruction-panel">
      <div class="shop-title">遊玩說明</div>
      <div class="line">1. 按下中央的「Parry is gay」按鈕賺取金錢。</div>
      <div class="line">2. 使用左側商店購買升級，增加每次點擊或自動收入。</div>
      <div class="line">3. 觀察左上角數值成長，繼續提升你的 Parry 等級。</div>
    </div>

    <div class="panel stats-grid">
      <div class="stat-card">
        <div class="stat-title">Parry 次數</div>
        <div class="stat-value" id="clickerCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">金錢</div>
        <div class="stat-value" id="moneyCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">點擊力</div>
        <div class="stat-value" id="powerCount">1</div>
      </div>
    </div>

    <div class="panel clicker-panel">
      <button class="clicker-btn" id="clickerBtn">Parry is gay</button>
      <div class="click-tip">每次點擊獲得 <span id="perClick">1</span> 元。自動收入：<span id="autoRate">0</span> /秒。</div>
    </div>

    <div class="panel shop-card">
      <div class="shop-title">商店</div>
      <div class="shop-item" data-id="auto">
        <div class="shop-meta">
          <div class="shop-name">自動 Parry</div>
          <div class="shop-desc">每秒自動獲得 1 元</div>
        </div>
        <div>
          <div class="shop-cost">50</div>
          <button class="buy-btn" data-id="auto">購買</button>
        </div>
      </div>
      <div class="shop-item" data-id="boost">
        <div class="shop-meta">
          <div class="shop-name">Parry 強化</div>
          <div class="shop-desc">每次點擊增加 1 元</div>
        </div>
        <div>
          <div class="shop-cost">200</div>
          <button class="buy-btn" data-id="boost">購買</button>
        </div>
      </div>
      <div class="shop-item" data-id="legend">
        <div class="shop-meta">
          <div class="shop-name">傳說 Parry</div>
          <div class="shop-desc">提升點擊力 +5，並獲得特殊效果</div>
        </div>
        <div>
          <div class="shop-cost">1000</div>
          <button class="buy-btn" data-id="legend">購買</button>
        </div>
      </div>
    </div>

    <div class="terminal" id="terminal">
      <div class="line prompt">$ system.online <span class="cursor" id="cursor"></span></div>
      <div id="output" class="line"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    let w, h, cols, ypos;

    function initMatrix(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cols = Math.floor(w / 20) + 1;
      ypos = Array(cols).fill(0).map(() => Math.floor(Math.random() * h));
    }

    function drawMatrix(){
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(57,255,20,0.9)';
      ctx.font = '14px monospace';
      ypos.forEach((y, ind) => {
        const text = String.fromCharCode(33 + Math.random() * 94);
        ctx.fillText(text, ind * 20, y);
        ypos[ind] = y > h && Math.random() > 0.975 ? 0 : y + 18;
      });
      requestAnimationFrame(drawMatrix);
    }

    window.addEventListener('resize', initMatrix);
    initMatrix();
    drawMatrix();

    const clickerBtn = document.getElementById('clickerBtn');
    const clickerCount = document.getElementById('clickerCount');
    const moneyCount = document.getElementById('moneyCount');
    const powerCount = document.getElementById('powerCount');
    const autoRate = document.getElementById('autoRate');
    const perClick = document.getElementById('perClick');
    const output = document.getElementById('output');
    const cursor = document.getElementById('cursor');

    let clicks = 0;
    let money = 0;
    let power = 1;
    let auto = 0;
    const shop = {
      auto: {cost: 50, qty: 0, rate: 1},
      boost: {cost: 200, qty: 0, power: 1},
      legend: {cost: 1000, qty: 0, power: 5}
    };

    function updateUI(){
      clickerCount.textContent = clicks;
      moneyCount.textContent = money;
      powerCount.textContent = power;
      autoRate.textContent = auto;
      perClick.textContent = power;
      document.querySelectorAll('.shop-item').forEach(item => {
        const id = item.dataset.id;
        const btn = item.querySelector('.buy-btn');
        btn.disabled = money < shop[id].cost;
        item.querySelector('.shop-cost').textContent = shop[id].cost;
      });
    }

    function log(text){
      const line = document.createElement('div');
      line.className = 'line';
      line.textContent = text;
      output.appendChild(line);
      output.parentElement.scrollTop = output.parentElement.scrollHeight;
    }

    function floatingText(x, y, text){
      const elem = document.createElement('div');
      elem.className = 'floating';
      elem.style.left = x + 'px';
      elem.style.top = y + 'px';
      elem.textContent = text;
      document.body.appendChild(elem);
      setTimeout(() => elem.remove(), 800);
    }

    clickerBtn.addEventListener('click', event => {
      clicks += 1;
      money += power;
      updateUI();
      floatingText(event.clientX, event.clientY, `+${power}`);
      if(clicks % 10 === 0){
        log(`> 已完成 ${clicks} 次 Parry click，當前金錢 ${money}。`);
      }
    });

    document.querySelectorAll('.buy-btn').forEach(button => {
      button.addEventListener('click', () => {
        const id = button.dataset.id;
        const item = shop[id];
        if(money < item.cost) return;
        money -= item.cost;
        item.qty += 1;
        if(id === 'auto') auto += item.rate;
        if(id === 'boost') power += item.power;
        if(id === 'legend') power += item.power;
        item.cost = Math.floor(item.cost * 1.8);
        updateUI();
        log(`> 購買 ${button.parentElement.previousElementSibling.querySelector('.shop-name').textContent} 成功。`);
      });
    });

    setInterval(() => {
      if(auto > 0){
        money += auto;
        updateUI();
      }
    }, 1000);

    const intro = [
      '>> Welcome to Parry is gay Clicker',
      '>> 點擊按鈕來賺錢、培養 Parry 力量',
      '>> 商店可購買自動收入與點擊強化',
      '>> 越早升級，越快成為 Parry 傳說',
      ''
    ];
    let introIndex = 0;
    let charIndex = 0;

    function typeIntro(){
      if(introIndex >= intro.length){
        cursor.style.display = 'none';
        return;
      }
      const line = document.createElement('div');
      line.className = 'line';
      output.appendChild(line);
      function typeChar(){
        if(charIndex < intro[introIndex].length){
          line.textContent += intro[introIndex][charIndex++];
          setTimeout(typeChar, 24 + Math.random() * 40);
        } else {
          introIndex += 1;
          charIndex = 0;
          setTimeout(typeIntro, 180);
          output.parentElement.scrollTop = output.parentElement.scrollHeight;
        }
      }
      typeChar();
    }
    typeIntro();
    updateUI();
  </script>
</body>
</html>
